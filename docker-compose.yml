services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aurum_finance_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aurum_finance_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MIX_ENV: prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHX_SERVER: "true"
      PHX_HOST: localhost
      PORT: 4040
      DATABASE_URL: ecto://postgres:postgres@db/aurum_finance_dev
      SECRET_KEY_BASE: insecure_dev_secret_key_base_change_me
    ports:
      - "4040:4040"

volumes:
  postgres_data:
